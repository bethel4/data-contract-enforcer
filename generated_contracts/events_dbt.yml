version: 2
models:
- name: events
  description: dbt-compatible contract for events
  columns:
  - name: event_id
    description: 'Auto-profiled. Null rate: 0.0%. Distinct values: 60.'
    tests:
    - not_null
    - unique
  - name: event_type
    description: 'Auto-profiled. Null rate: 0.0%. Distinct values: 1.'
    tests:
    - not_null
    - accepted_values:
        values:
        - DocumentProcessed
  - name: aggregate_id
    description: 'Auto-profiled. Null rate: 0.0%. Distinct values: 1.'
    tests:
    - not_null
    - accepted_values:
        values:
        - 85489556-f617-42e2-85f4-d51a0efadbbb
  - name: aggregate_type
    description: 'Auto-profiled. Null rate: 0.0%. Distinct values: 1.'
    tests:
    - not_null
    - accepted_values:
        values:
        - Document
  - name: sequence_number
    description: 'Auto-profiled. Null rate: 0.0%. Distinct values: 60.'
    tests:
    - not_null
    - dbt_utils.expression_is_true:
        expression: sequence_number >= 1.0 AND sequence_number <= 60.0
